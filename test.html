<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validation Tests — Mahdood</title>
    <meta name="description" content="Internal validation test page for the Mahdood site build pipeline." />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: #0d0d0d;
        color: #f0f0f0;
        padding: 2rem;
      }
      h1 {
        font-size: 1.2rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #d4a017;
        margin-bottom: 2rem;
      }
      .suite { margin-bottom: 2rem; }
      .suite-title {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: #8b6914;
        margin-bottom: 0.75rem;
      }
      .test {
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
        padding: 0.4rem 0;
        border-bottom: 1px solid #1a1a1a;
        font-size: 0.9rem;
      }
      .badge {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0.15rem 0.5rem;
        border-radius: 3px;
        flex-shrink: 0;
      }
      .badge.pass  { background: #1a3a1a; color: #4caf50; }
      .badge.fail  { background: #3a1a1a; color: #ef5350; }
      .badge.error { background: #2a1a2a; color: #ab47bc; }
      .reason { font-size: 0.78rem; color: #999; margin-left: auto; }
      #summary {
        margin-top: 2rem;
        font-size: 0.85rem;
        color: #999;
        border-top: 1px solid #2a2a2a;
        padding-top: 1rem;
      }
      #summary strong { color: #f0f0f0; }
    </style>
  </head>
  <body>
    <h1>Validation Tests</h1>
    <div id="output"></div>
    <div id="summary"></div>

    <script>
      // ── Test runner ──
      const results = [];
      let currentSuite = null;

      function describe(name, fn) {
        currentSuite = { name, tests: [] };
        results.push(currentSuite);
        fn();
      }

      function it(description, fn) {
        try {
          fn();
          currentSuite.tests.push({ status: 'pass', description });
        } catch (err) {
          currentSuite.tests.push({ status: 'fail', description, reason: err.message });
        }
      }

      function expect(actual) {
        return {
          toBe(expected) {
            if (actual !== expected)
              throw new Error(`expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
          },
          toContain(str) {
            if (typeof actual !== 'string' || !actual.includes(str))
              throw new Error(`expected "${actual}" to contain "${str}"`);
          },
          toBeTruthy() {
            if (!actual) throw new Error(`expected truthy, got ${JSON.stringify(actual)}`);
          },
          toBeFalsy() {
            if (actual) throw new Error(`expected falsy, got ${JSON.stringify(actual)}`);
          },
        };
      }

      // ── Test suites ──
      // validate.js must expose these as globals:
      //   validateEmail, validateRequired, sanitizeName,
      //   validateMessageLength, getErrorMessage

      function runTests() {
        describe('Email validation', () => {
          it('accepts a well-formed email address', () => {
            expect(validateEmail('jane@venue.com')).toBe(true);
          });
          it('rejects an address with no @', () => {
            expect(validateEmail('janevenuecom')).toBe(false);
          });
          it('rejects an address with no domain part', () => {
            expect(validateEmail('jane@')).toBe(false);
          });
          it('rejects an empty string', () => {
            expect(validateEmail('')).toBe(false);
          });
          it('rejects whitespace only', () => {
            expect(validateEmail('   ')).toBe(false);
          });
        });

        describe('Required field checks', () => {
          it('passes a non-empty string', () => {
            expect(validateRequired('hello')).toBe(true);
          });
          it('fails an empty string', () => {
            expect(validateRequired('')).toBe(false);
          });
          it('fails a whitespace-only string', () => {
            expect(validateRequired('   ')).toBe(false);
          });
        });

        describe('XSS prevention — name field', () => {
          it('strips <script> tags from input', () => {
            expect(sanitizeName('<script>alert(1)<\/script>Bob')).toBe('Bob');
          });
          it('strips HTML tags', () => {
            expect(sanitizeName('<b>Jane</b>')).toBe('Jane');
          });
          it('leaves plain text untouched', () => {
            expect(sanitizeName('Jane Smith')).toBe('Jane Smith');
          });
        });

        describe('Message length', () => {
          it('passes a message of exactly 10 characters', () => {
            expect(validateMessageLength('1234567890')).toBe(true);
          });
          it('fails a message shorter than 10 characters', () => {
            expect(validateMessageLength('short')).toBe(false);
          });
          it('fails an empty message', () => {
            expect(validateMessageLength('')).toBe(false);
          });
        });

        describe('Error messages', () => {
          it('returns the correct message for an invalid email', () => {
            expect(getErrorMessage('email')).toContain('valid email');
          });
          it('returns the correct message for a missing name', () => {
            expect(getErrorMessage('name')).toContain('name');
          });
          it('returns the correct message for a missing event type', () => {
            expect(getErrorMessage('eventType')).toContain('event type');
          });
          it('returns the correct message for a short message', () => {
            expect(getErrorMessage('message')).toContain('10');
          });
        });

        render();
      }

      // ── Render results ──
      function render() {
        const output = document.getElementById('output');
        const summary = document.getElementById('summary');
        let pass = 0, fail = 0;

        results.forEach(suite => {
          const suiteEl = document.createElement('div');
          suiteEl.className = 'suite';

          const title = document.createElement('div');
          title.className = 'suite-title';
          title.textContent = suite.name;
          suiteEl.appendChild(title);

          suite.tests.forEach(t => {
            if (t.status === 'pass') pass++; else fail++;

            const row = document.createElement('div');
            row.className = 'test';

            const badge = document.createElement('span');
            badge.className = `badge ${t.status}`;
            badge.textContent = t.status;

            const desc = document.createElement('span');
            desc.textContent = t.description;

            row.appendChild(badge);
            row.appendChild(desc);

            if (t.reason) {
              const reason = document.createElement('span');
              reason.className = 'reason';
              reason.textContent = t.reason;
              row.appendChild(reason);
            }

            suiteEl.appendChild(row);
          });

          output.appendChild(suiteEl);
        });

        const total = pass + fail;
        summary.innerHTML =
          `<strong>${total}</strong> tests — ` +
          `<strong style="color:#4caf50">${pass} passed</strong>, ` +
          `<strong style="color:#ef5350">${fail} failed</strong>`;
      }

      // ── Load validate.js, then run ──
      // Uses a script tag so it works over file:// without CORS issues
      const script = document.createElement('script');
      script.src = 'scripts/validate.js';
      script.onload = () => runTests();
      script.onerror = () => {
        // validate.js doesn't exist yet — show a single error suite
        currentSuite = { name: 'Module load', tests: [] };
        results.push(currentSuite);
        currentSuite.tests.push({
          status: 'fail',
          description: 'load scripts/validate.js',
          reason: 'file not found — create scripts/validate.js to begin',
        });
        render();
      };
      document.head.appendChild(script);
    </script>
  </body>
</html>
